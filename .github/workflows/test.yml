build_client:
  runs-on: ${{ matrix.os }}
  needs: generate_docs
  strategy:
    matrix:
      include:
        - os: ubuntu-latest
          platform: linux
        - os: macos-latest
          platform: macos
        - os: windows-latest
          platform: windows
  steps:
    - name: Checkout cfclient
      uses: actions/checkout@v4
      with:
        repository: leeebo/crazyflie-clients-python
        ref: master
        path: cfclient
        submodules: 'recursive'

    - name: Checkout crazyflie-lib-python
      uses: actions/checkout@v4
      with:
        repository: leeebo/crazyflie-lib-python
        ref: master
        path: crazyflie-lib-python

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system deps (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1-mesa-dri libgl1

    - name: Install system deps (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install pyqt5

    - name: Install Python packages (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        pip install -e ./crazyflie-lib-python
        if [ -f ./cfclient/requirements.txt ]; then
          pip install -r ./cfclient/requirements.txt
        else
          echo "requirements.txt not found, installing from setup.py"
          pip install -e ./cfclient
        fi
        pip install pyinstaller

    - name: Install Python packages (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        pip install -e ./crazyflie-lib-python
        if [ -f ./cfclient/requirements.txt ]; then
          pip install -r ./cfclient/requirements.txt
        else
          echo "requirements.txt not found, installing from setup.py"
          pip install -e ./cfclient
        fi
        pip install pyinstaller

    - name: Build executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd cfclient
        pyinstaller --onefile --name cfclient \
          --add-data "bin:bin" \
          --add-data "lib:lib" \
          --add-data "src:src" \
          --hidden-import PyQt5.sip \
          bin/cfclient
        cd dist && zip -r cfclient-linux-amd64.zip cfclient && echo "artifact_path=$(pwd)/cfclient-linux-amd64.zip" >> $GITHUB_OUTPUT

    - name: Build executable (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd cfclient
        pyinstaller --onefile --windowed --name cfclient \
          --add-data "bin:bin" \
          --add-data "lib:lib" \
          --add-data "src:src" \
          --hidden-import PyQt5.sip \
          bin/cfclient
        cd dist && zip -r cfclient-macos.zip cfclient.app && echo "artifact_path=$(pwd)/cfclient-macos.zip" >> $GITHUB_OUTPUT

    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cd cfclient
        pyinstaller --onefile --name cfclient.exe --add-data "bin;bin" --add-data "lib;lib" --add-data "src;src" --hidden-import PyQt5.sip bin/cfclient
        cd dist
        zip -r cfclient-windows.zip cfclient.exe
        echo "artifact_path=$(pwd)/cfclient-windows.zip" >> $GITHUB_OUTPUT
      # 注意：Windows 上 zip 命令需要安装，但 GitHub runner 默认有 7zip，可以用 7z 或 zip。这里用 zip 可能没有，改用 powershell compress-archive 更安全，但为了 bash 一致性，可改用 7z。
      # 更可靠的方式：
      # powershell Compress-Archive -Path cfclient.exe -DestinationPath cfclient-windows.zip
      # 但需要切换 shell 到 pwsh。下面单独处理。

    # 为 Windows 单独使用 PowerShell 打包
    - name: Build executable (Windows) - alternative
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd cfclient
        pyinstaller --onefile --name cfclient.exe --add-data "bin;bin" --add-data "lib;lib" --add-data "src;src" --hidden-import PyQt5.sip bin\cfclient
        cd dist
        Compress-Archive -Path cfclient.exe -DestinationPath cfclient-windows.zip
        $artifact_path = Resolve-Path cfclient-windows.zip
        echo "artifact_path=$artifact_path" >> $env:GITHUB_OUTPUT

    - name: Upload client artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfclient_${{ matrix.platform }}_${{ github.run_number }}
        path: ${{ steps.build.outputs.artifact_path }}
        if-no-files-found: error
