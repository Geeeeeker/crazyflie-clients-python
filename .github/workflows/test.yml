name: Build cfclient (Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean
      build_amd64:
        description: 'Build for amd64 (x86_64)'
        required: true
        default: true
        type: boolean
      build_arm64:
        description: 'Build for arm64 (Apple Silicon / Linux ARM)'
        required: true
        default: false
        type: boolean

jobs:
  build_amd64:
    if: inputs.build_amd64 == true
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-13
            platform: macos
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout cfclient
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pyqt5

      - name: Install Python packages (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Install Python packages (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --windowed --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip -r cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient.app
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd cfclient
          $addData = @("--add-data", "bin;bin", "--add-data", "src;src")
          if (Test-Path "lib") { $addData += "--add-data", "lib;lib" }
          if (Test-Path "resources") { $addData += "--add-data", "resources;resources" }
          $pyInstallerArgs = @(
            "--onefile", "--name", "cfclient.exe",
            "--hidden-import", "PyQt5.sip",
            "--"
          ) + $addData + @("bin/cfclient")
          python -m PyInstaller $pyInstallerArgs
          cd dist
          if (Test-Path cfclient.exe) {
            Compress-Archive -Path cfclient.exe -DestinationPath cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip
            $artifact_path = Resolve-Path cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip
            echo "ARTIFACT_PATH=$artifact_path" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Error "cfclient.exe not found"
            exit 1
          }

      - name: Upload artifact (AMD64)
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ matrix.arch }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  build_arm64:
    if: inputs.build_arm64 == true
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: macos
            arch: arm64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - name: Checkout cfclient
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux ARM)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1

      - name: Install system deps (macOS ARM)
        if: runner.os == 'macOS'
        run: brew install pyqt5

      - name: Install Python packages
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Build executable (Linux ARM)
        if: runner.os == 'Linux'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Build executable (macOS ARM)
        if: runner.os == 'macOS'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --windowed --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip -r cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient.app
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Upload artifact (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ matrix.arch }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build_amd64, build_arm64]
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads
            - **Linux amd64**: cfclient_linux_amd64_*.zip
            - **Linux arm64**: cfclient_linux_arm64_*.zip (if built)
            - **macOS Intel**: cfclient_macos_amd64_*.zip
            - **macOS Apple Silicon**: cfclient_macos_arm64_*.zip
            - **Windows amd64**: cfclient_windows_amd64_*.zip
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
