name: Build cfclient (Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean
      architecture:
        description: 'Target architecture(s)'
        required: true
        default: 'amd64,arm64'
        type: choice
        options:
          - amd64
          - arm64
          - amd64,arm64

jobs:
  build_client:
    strategy:
      matrix:
        include: ${{ fromJSON(
          (inputs.architecture == 'amd64' && '[{"os":"ubuntu-latest","platform":"linux","arch":"amd64"},{"os":"macos-13","platform":"macos","arch":"amd64"},{"os":"windows-latest","platform":"windows","arch":"amd64"}]') ||
          (inputs.architecture == 'arm64' && '[{"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64"},{"os":"macos-latest","platform":"macos","arch":"arm64"}]') ||
          (inputs.architecture == 'amd64,arm64' && '[{"os":"ubuntu-latest","platform":"linux","arch":"amd64"},{"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64"},{"os":"macos-13","platform":"macos","arch":"amd64"},{"os":"macos-latest","platform":"macos","arch":"arm64"},{"os":"windows-latest","platform":"windows","arch":"amd64"}]')
        ) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout cfclient (leeebo fork)
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pyqt5

      - name: Install Python packages (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Install Python packages (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist
          zip cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --windowed --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist
          zip -r cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip cfclient.app
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd cfclient
          $ADD_DATA = "--add-data bin;bin --add-data src;src"
          if (Test-Path "lib") { $ADD_DATA += " --add-data lib;lib" }
          if (Test-Path "resources") { $ADD_DATA += " --add-data resources;resources" }
          python -m PyInstaller --onefile --name cfclient.exe $ADD_DATA --hidden-import PyQt5.sip "bin/cfclient"
          cd dist
          Compress-Archive -Path cfclient.exe -DestinationPath cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip
          $artifact_path = Resolve-Path cfclient-${{ matrix.platform }}-${{ matrix.arch }}.zip
          echo "ARTIFACT_PATH=$artifact_path" >> $env:GITHUB_ENV

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ matrix.arch }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build_client
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads (Arch: ${{ inputs.architecture }})
            - **Linux amd64**: cfclient_linux_amd64_*.zip
            - **Linux arm64**: cfclient_linux_arm64_*.zip (requires Ubuntu 24.04 ARM runner)
            - **macOS Intel**: cfclient_macos_amd64_*.zip
            - **macOS Apple Silicon**: cfclient_macos_arm64_*.zip
            - **Windows amd64**: cfclient_windows_amd64_*.zip
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
