name: Build cfclient (Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

jobs:
  # ==================== Linux (amd64 + arm64) ====================
  build_linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    steps:
      - name: Checkout cfclient
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1

      - name: Install Python packages
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Generate version.json (if missing)
        run: |
          cd cfclient
          if [ ! -f src/cfclient/version.json ]; then
            echo '{"version": "dev"}' > src/cfclient/version.json
          fi

      - name: Patch __init__.py for PyInstaller
        run: |
          cd cfclient
          cat > patch_init.py << 'EOF'
          import os, re, sys
          target = "src/cfclient/__init__.py"
          with open(target, 'r') as f:
              content = f.read()

          # 1. 修改 frozen 分支中的 module_path 定义
          old_assign = r'(\s*else:\s*\n\s*)(module_path = os\.path\.join\(os\.path\.dirname\(sys\.executable\), \'lib\', \'cfclient\'\))'
          new_assign = r'\1if hasattr(sys, \'_MEIPASS\'):\n        module_path = sys._MEIPASS\n    else:\n        module_path = os.path.join(os.path.dirname(sys.executable), \'lib\', \'cfclient\')'
          content = re.sub(old_assign, new_assign, content, flags=re.MULTILINE)

          # 2. 替换 version.json 的读取逻辑
          helper = '''
          def _get_version_json_path():
              import sys, os
              if getattr(sys, 'frozen', False) and hasattr(sys, '_MEIPASS'):
                  # Try root of _MEIPASS first (added by --add-data)
                  root_path = os.path.join(sys._MEIPASS, 'version.json')
                  if os.path.exists(root_path):
                      return root_path
                  # Fallback to the original module_path (for compatibility)
              return os.path.join(module_path, 'version.json')
          '''
          if '_get_version_json_path' not in content:
              # Insert after imports
              lines = content.splitlines(keepends=True)
              insert_pos = 0
              for i, line in enumerate(lines):
                  if line.startswith('import ') or line.startswith('from '):
                      insert_pos = i + 1
                      break
              lines.insert(insert_pos, helper)
              content = ''.join(lines)

          # Replace the actual open call
          content = content.replace('with open(os.path.join(module_path, "version.json")) as f:',
                                    'with open(_get_version_json_path()) as f:')

          with open(target, 'w') as f:
              f.write(content)
          print("Patched", target)
          EOF
          python3 patch_init.py

      - name: Build for Linux ${{ matrix.arch }}
        run: |
          cd cfclient
          # Prepare data: add version.json to root of _MEIPASS
          ADD_DATA="--add-data bin:bin --add-data src:src --collect-data cfclient"
          ADD_DATA="$ADD_DATA --add-data src/cfclient/version.json:version.json"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist
          zip cfclient-linux-${{ matrix.arch }}.zip cfclient
          echo "ARTIFACT_PATH=$(pwd)/cfclient-linux-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_linux_${{ matrix.arch }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  # ==================== macOS (Intel + Apple Silicon) ====================
  build_macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: amd64
          - runner: macos-latest
            arch: arm64
    steps:
      - name: Checkout cfclient
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install pyqt5
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Generate version.json (if missing)
        run: |
          cd cfclient
          if [ ! -f src/cfclient/version.json ]; then
            echo '{"version": "dev"}' > src/cfclient/version.json
          fi

      - name: Patch __init__.py for PyInstaller
        run: |
          cd cfclient
          cat > patch_init.py << 'EOF'
          import os, re, sys
          target = "src/cfclient/__init__.py"
          with open(target, 'r') as f:
              content = f.read()
          old_assign = r'(\s*else:\s*\n\s*)(module_path = os\.path\.join\(os\.path\.dirname\(sys\.executable\), \'lib\', \'cfclient\'\))'
          new_assign = r'\1if hasattr(sys, \'_MEIPASS\'):\n        module_path = sys._MEIPASS\n    else:\n        module_path = os.path.join(os.path.dirname(sys.executable), \'lib\', \'cfclient\')'
          content = re.sub(old_assign, new_assign, content, flags=re.MULTILINE)
          helper = '''
          def _get_version_json_path():
              import sys, os
              if getattr(sys, 'frozen', False) and hasattr(sys, '_MEIPASS'):
                  root_path = os.path.join(sys._MEIPASS, 'version.json')
                  if os.path.exists(root_path):
                      return root_path
              return os.path.join(module_path, 'version.json')
          '''
          if '_get_version_json_path' not in content:
              lines = content.splitlines(keepends=True)
              insert_pos = 0
              for i, line in enumerate(lines):
                  if line.startswith('import ') or line.startswith('from '):
                      insert_pos = i + 1
                      break
              lines.insert(insert_pos, helper)
              content = ''.join(lines)
          content = content.replace('with open(os.path.join(module_path, "version.json")) as f:',
                                    'with open(_get_version_json_path()) as f:')
          with open(target, 'w') as f:
              f.write(content)
          print("Patched", target)
          EOF
          python3 patch_init.py

      - name: Build for macOS ${{ matrix.arch }}
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src --collect-data cfclient"
          ADD_DATA="$ADD_DATA --add-data src/cfclient/version.json:version.json"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --windowed --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist
          zip -r cfclient-macos-${{ matrix.arch }}.zip cfclient.app
          echo "ARTIFACT_PATH=$(pwd)/cfclient-macos-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_macos_${{ matrix.arch }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  # ==================== Windows (amd64 only) ====================
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout cfclient
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Generate version.json (if missing)
        shell: bash
        run: |
          cd cfclient
          if [ ! -f src/cfclient/version.json ]; then
            echo '{"version": "dev"}' > src/cfclient/version.json
          fi

      - name: Patch __init__.py for PyInstaller
        shell: bash
        run: |
          cd cfclient
          cat > patch_init.py << 'EOF'
          import os, re, sys
          target = "src/cfclient/__init__.py"
          with open(target, 'r', encoding='utf-8') as f:
              content = f.read()
          old_assign = r'(\s*else:\s*\n\s*)(module_path = os\.path\.join\(os\.path\.dirname\(sys\.executable\), \'lib\', \'cfclient\'\))'
          new_assign = r'\1if hasattr(sys, \'_MEIPASS\'):\n        module_path = sys._MEIPASS\n    else:\n        module_path = os.path.join(os.path.dirname(sys.executable), \'lib\', \'cfclient\')'
          content = re.sub(old_assign, new_assign, content, flags=re.MULTILINE)
          helper = '''
          def _get_version_json_path():
              import sys, os
              if getattr(sys, 'frozen', False) and hasattr(sys, '_MEIPASS'):
                  root_path = os.path.join(sys._MEIPASS, 'version.json')
                  if os.path.exists(root_path):
                      return root_path
              return os.path.join(module_path, 'version.json')
          '''
          if '_get_version_json_path' not in content:
              lines = content.splitlines(keepends=True)
              insert_pos = 0
              for i, line in enumerate(lines):
                  if line.startswith('import ') or line.startswith('from '):
                      insert_pos = i + 1
                      break
              lines.insert(insert_pos, helper)
              content = ''.join(lines)
          content = content.replace('with open(os.path.join(module_path, "version.json")) as f:',
                                    'with open(_get_version_json_path()) as f:')
          with open(target, 'w', encoding='utf-8') as f:
              f.write(content)
          print("Patched", target)
          EOF
          python patch_init.py

      - name: Build for Windows amd64
        shell: cmd
        run: |
          cd cfclient
          set ADD_DATA=--add-data bin;bin --add-data src;src --collect-data cfclient
          set ADD_DATA=%ADD_DATA% --add-data src/cfclient/version.json;version.json
          if exist resources set ADD_DATA=%ADD_DATA% --add-data resources;resources
          python -m PyInstaller --onefile --name cfclient.exe %ADD_DATA% --hidden-import PyQt5.sip bin/cfclient
          cd dist
          if exist cfclient.exe (
            7z a -tzip cfclient-windows-amd64.zip cfclient.exe
            echo ARTIFACT_PATH=%cd%\cfclient-windows-amd64.zip>> %GITHUB_ENV%
          ) else (
            echo cfclient.exe not found
            exit 1
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_windows_amd64_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  # ==================== Release ====================
  release:
    runs-on: ubuntu-latest
    needs: [build_linux, build_macos, build_windows]
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads
            ### Linux
            - amd64: cfclient_linux_amd64_*.zip
            - arm64: cfclient_linux_arm64_*.zip (requires Ubuntu 24.04 ARM runner)
            ### macOS
            - Intel (amd64): cfclient_macos_amd64_*.zip
            - Apple Silicon (arm64): cfclient_macos_arm64_*.zip
            ### Windows
            - amd64: cfclient_windows_amd64_*.zip
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
