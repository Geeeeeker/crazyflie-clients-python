name: Build cfclient (Cross-Platform)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

jobs:
  build_client:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - name: Checkout cfclient (leeebo fork)
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1-mesa-dri libgl1

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install pyqt5

      - name: Install Python packages (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Install Python packages (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd cfclient
          pyinstaller --onefile --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          cd dist && zip -r cfclient-linux-amd64.zip cfclient
          echo "artifact_path=$(pwd)/cfclient-linux-amd64.zip" >> $GITHUB_OUTPUT

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd cfclient
          pyinstaller --onefile --windowed --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          cd dist && zip -r cfclient-macos.zip cfclient.app
          echo "artifact_path=$(pwd)/cfclient-macos.zip" >> $GITHUB_OUTPUT

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd cfclient
          pyinstaller --onefile --name cfclient.exe `
            --add-data "bin;bin" `
            --add-data "lib;lib" `
            --add-data "src;src" `
            --hidden-import PyQt5.sip `
            bin\cfclient
          cd dist
          Compress-Archive -Path cfclient.exe -DestinationPath cfclient-windows.zip
          $artifact_path = Resolve-Path cfclient-windows.zip
          echo "artifact_path=$artifact_path" >> $env:GITHUB_OUTPUT

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ github.run_number }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build_client
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads
            - **Linux**: cfclient_linux_*.zip
            - **macOS**: cfclient_macos_*.zip
            - **Windows**: cfclient_windows_*.zip
          files: |
            artifacts/cfclient_linux_*/cfclient-linux-*.zip
            artifacts/cfclient_macos_*/cfclient-macos-*.zip
            artifacts/cfclient_windows_*/cfclient-windows-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
