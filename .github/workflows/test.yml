name: Build cfclient (Cross-Platform)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

jobs:
  build_client:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout cfclient (leeebo fork)
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pyqt5

      - name: Install Python packages (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Install Python packages (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -e ./crazyflie-lib-python
          if [ -f ./cfclient/requirements.txt ]; then
            pip install -r ./cfclient/requirements.txt
          else
            pip install -e ./cfclient
          fi
          pip install pyinstaller

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip cfclient-${{ matrix.platform }}-amd64.zip cfclient
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-amd64.zip" >> $GITHUB_ENV

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          cd cfclient
          ADD_DATA="--add-data bin:bin --add-data src:src"
          [ -d "lib" ] && ADD_DATA="$ADD_DATA --add-data lib:lib"
          [ -d "resources" ] && ADD_DATA="$ADD_DATA --add-data resources:resources"
          pyinstaller --onefile --windowed --name cfclient $ADD_DATA --hidden-import PyQt5.sip bin/cfclient
          cd dist && zip -r cfclient-${{ matrix.platform }}-amd64.zip cfclient.app
          echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-amd64.zip" >> $GITHUB_ENV

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd cfclient
          ADD_DATA="--add-data bin;bin --add-data src;src"
          if [ -d "lib" ]; then ADD_DATA="$ADD_DATA --add-data lib;lib"; fi
          if [ -d "resources" ]; then ADD_DATA="$ADD_DATA --add-data resources;resources"; fi
          # 关键：使用 python -m PyInstaller 并正确引用脚本路径
          python -m PyInstaller --onefile --name cfclient.exe $ADD_DATA --hidden-import PyQt5.sip "bin/cfclient"
          cd dist
          if [ -f cfclient.exe ]; then
            zip cfclient-${{ matrix.platform }}-amd64.zip cfclient.exe
            echo "ARTIFACT_PATH=$(pwd)/cfclient-${{ matrix.platform }}-amd64.zip" >> $GITHUB_ENV
          else
            echo "Build failed: cfclient.exe not found"
            exit 1
          fi

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ github.run_number }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build_client
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads
            - **Linux**: cfclient_linux_*.zip
            - **macOS**: cfclient_macos_*.zip
            - **Windows**: cfclient_windows_*.zip
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
