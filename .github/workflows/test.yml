name: Build cfclient (Cross-Platform) with Official Docs

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

jobs:
  generate_docs:
    runs-on: ubuntu-22.04   # 固定使用 22.04 以避免依赖问题
    outputs:
      doc_generated: ${{ steps.check_doc.outputs.doc_generated }}
    steps:
      - name: Checkout crazyflie-firmware
        uses: actions/checkout@v4
        with:
          repository: bitcraze/crazyflie-firmware
          path: firmware

      - name: Generate log_param_doc.json
        id: check_doc
        run: |
          cd firmware
          docker run --rm -e "HOST_CW_DIR=${PWD}" \
            -e "CALLING_HOST_NAME=$(hostname)" \
            -e "CALLING_UID=$UID" \
            -e "CALLING_OS=$(uname)" \
            -v ${PWD}:/tb-module \
            -v /var/run/docker.sock:/var/run/docker.sock \
            bitcraze/toolbelt build-docs
          if [ -f docs/api/log_param_doc.json ]; then
            echo "doc_generated=true" >> $GITHUB_OUTPUT
          else
            echo "doc_generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload doc artifact
        uses: actions/upload-artifact@v4
        with:
          name: log_param_doc.json
          path: firmware/docs/api/log_param_doc.json

  build_client:
    runs-on: ${{ matrix.os }}
    needs: generate_docs
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04        # 显式使用 22.04
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - name: Checkout cfclient (leeebo fork)
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-clients-python
          ref: master
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python
        uses: actions/checkout@v4
        with:
          repository: leeebo/crazyflie-lib-python
          ref: master
          path: crazyflie-lib-python

      - name: Download generated doc
        if: needs.generate_docs.outputs.doc_generated == 'true'
        uses: actions/download-artifact@v4
        with:
          name: log_param_doc.json
          path: cfclient/src/cfclient/resources/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg || true
          # 尝试安装 libgl1-mesa-glx，如果失败则安装 libgl1
          sudo apt-get install -y libgl1-mesa-glx || sudo apt-get install -y libgl1

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install pyqt5

      - name: Install Python packages
        run: |
          pip install -e ./crazyflie-lib-python
          pip install -r ./cfclient/requirements.txt
          pip install pyinstaller

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cd cfclient
          pyinstaller --onefile --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          cd dist && zip -r cfclient-linux-amd64.zip cfclient && echo "artifact_path=$(pwd)/cfclient-linux-amd64.zip" >> $GITHUB_OUTPUT

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd cfclient
          pyinstaller --onefile --windowed --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          cd dist && zip -r cfclient-macos.zip cfclient.app && echo "artifact_path=$(pwd)/cfclient-macos.zip" >> $GITHUB_OUTPUT

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd cfclient
          pyinstaller --onefile --name cfclient.exe --add-data "bin;bin" --add-data "lib;lib" --add-data "src;src" --hidden-import PyQt5.sip bin\cfclient
          cd dist
          Compress-Archive -Path cfclient.exe -DestinationPath cfclient-windows.zip
          $artifact_path = Resolve-Path cfclient-windows.zip
          echo "artifact_path=$artifact_path" >> $env:GITHUB_OUTPUT

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ github.run_number }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-22.04
    needs: build_client
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('client-{0}', github.run_number) }}
          name: "ESP-Drone Client ${{ inputs.release_tag || github.run_number }}"
          body: |
            ## PC Client Downloads
            - **Linux**: cfclient_linux_*.zip
            - **macOS**: cfclient_macos_*.zip
            - **Windows**: cfclient_windows_*.zip
          files: |
            artifacts/cfclient_linux_*/cfclient-linux-*.zip
            artifacts/cfclient_macos_*/cfclient-macos-*.zip
            artifacts/cfclient_windows_*/cfclient-windows-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
